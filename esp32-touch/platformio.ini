; TravelBoard — Waveshare ESP32-S3-Touch-LCD-7B (1024×600, esp_lcd RGB)

[platformio]
default_envs = esp32-s3-devkitc-1

; Default: stock PlatformIO (Arduino 2.0 / IDF 4.4). Full-screen LVGL + full_refresh.
; For hardware double-FB (num_fbs=2), switch env to esp32-s3-idf54 (needs git/cmake for tool install).
[env:esp32-s3-devkitc-1]
platform = espressif32 @ ^6.9.0
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_port = COM4
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

build_flags =
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -I include
  ; Waveshare 7B USB-UART bridge is on UART0 (COM4). CDC on boot sends Serial elsewhere.
  -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
  lvgl/lvgl @ ~8.3.11
  bblanchon/ArduinoJson @ ^7.2.0
  FS
  LittleFS

lib_ldf_mode = deep+

; Arduino 3.x / ESP-IDF 5.5 — hardware double framebuffer (anti-tear).
; Platform: pioarduino (maintained successor to the Tasmota fork). Env id kept as
; "idf54" so existing npm scripts (esp32:build-idf54 / esp32:upload-idf54) still resolve.
[env:esp32-s3-idf54]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_port = COM4
monitor_rts = 0
monitor_dtr = 0
upload_speed = 921600
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
build_flags =
  -DBOARD_HAS_PSRAM
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -I include
  ; LDF builds the bundled FS lib but doesn't add its headers to LittleFS's
  ; include path; expose them globally so LittleFS.cpp finds FS.h / vfs_api.h.
  -I "${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src"
  ; Waveshare 7B USB-UART bridge is on UART0 (COM4). CDC on boot sends Serial elsewhere.
  -DARDUINO_USB_CDC_ON_BOOT=0
  ; Set to 1 to try hardware double-FB + full LVGL refresh (experimental).
  -DTB_LCD_DOUBLE_FB=1
  ; Required for RGB bounce-buffer mode on ESP32-S3 (IDF 5.x).
  -DCONFIG_ESP32S3_DATA_CACHE_LINE_64B=y
lib_deps =
  lvgl/lvgl @ ~8.3.11
  bblanchon/ArduinoJson @ ^7.2.0
  FS
  LittleFS
lib_ldf_mode = deep+
extra_scripts = pre:scripts/pio-idf54-fix.py
