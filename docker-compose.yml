services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: travelboard
      POSTGRES_PASSWORD: travelboard
      POSTGRES_DB: travelboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://travelboard:travelboard@db:5432/travelboard"
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

volumes:
  pgdata:
